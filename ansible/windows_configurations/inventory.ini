# Group containing the Windows virtual machines used for the DVWA environment.
[dvwa_windows]

# Vulnerable Windows VM: DVWA uses the lowest security level and the firewall is disabled.
vulnerable-windows ansible_host=10.0.2.10 dvwa_security_level=low firewall_enabled=false

# Protected Windows VM: DVWA uses the highest security level and the firewall is enabled.
protected-windows ansible_host=10.0.3.10 dvwa_security_level=impossible firewall_enabled=true

# Common connection variables for all Windows virtual machines.
[dvwa_windows:vars]
ansible_user="{{ windows_username }}"
ansible_password="{{ windows_password }}"
ansible_connection=winrm
ansible_winrm_transport=ntlm
ansible_port=5985